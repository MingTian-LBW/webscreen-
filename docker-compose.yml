version: '3.8'

services:
  webscreen:
    build: .
    container_name: webscreen
    ports:
      - "8079:8079"
    environment:
      - PIN=123456
      - PORT=8079
    # 使用 host 网络模式以便 ADB 连接设备
    network_mode: host
    # 允许访问设备
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # 需要 privileged 权限以访问 USB 设备
    privileged: true
